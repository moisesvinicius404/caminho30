<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diário - Caminho30</title>
  <link rel="stylesheet" href="../css/missao-diario.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
   
    <main class="p-4 flex-grow-1">
      <h1>Diário de Progresso</h1>
      <p>Complete suas tarefas e marque seu progresso. Dividido em 4 etapas, uma para cada semana.</p>
      
      <div class="progress-container mt-4">
        <div class="progress-step mb-3">
          <h5>Semana 1</h5>
          <input type="checkbox" id="week1"> Concluído
        </div>
        <div class="progress-step mb-3">
          <h5>Semana 2</h5>
          <input type="checkbox" id="week2"> Concluído
        </div>
        <div class="progress-step mb-3">
          <h5>Semana 3</h5>
          <input type="checkbox" id="week3"> Concluído
        </div>
        <div class="progress-step mb-3">
          <h5>Semana 4</h5>
          <input type="checkbox" id="week4"> Concluído
        </div>
      </div>
      
      <button class="btn btn-primary mt-3">Salvar Progresso</button>
    </main>
  </div>

 
</body>
</html>
